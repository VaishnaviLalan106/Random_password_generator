<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --danger: #ef4444;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at top left,
          #2563eb 0%,
          #0b1220 40%,
          #020617 100%
        );
        color: var(--text);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      .card {
        width: min(100%, 540px);
        background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        padding: 1.2rem;
      }
      .card h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .card p.subtitle {
        margin: 0.25rem 0 1rem;
        color: #cbd5e1;
        font-size: 0.9rem;
      }
      .form {
        display: grid;
        gap: 0.7rem;
      }
      label {
        font-size: 0.9rem;
        color: #e2e8f0;
        margin-bottom: 0.22rem;
        display: block;
      }
      input[type="number"],
      button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #f8fafc;
        padding: 0.55rem 0.7rem;
        font-size: 0.95rem;
      }
      input[type="number"]:focus,
      button:focus {
        outline: 2px solid #3b82f6;
        border-color: #3b82f6;
      }
      .checkbox-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.45rem;
      }
      .checkbox {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        border-radius: 7px;
        border: 1px solid #273449;
        padding: 0.35rem 0.45rem;
        background: #111827;
      }
      .checkbox span {
        font-size: 0.9rem;
        color: #e2e8f0;
      }
      .generate {
        margin-top: 0.1rem;
        background: linear-gradient(90deg, #2563eb, #4f46e5);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .result {
        margin-top: 0.7rem;
        border-radius: 8px;
        border: 1px dashed #334155;
        background: #0b1220;
        padding: 0.65rem;
        word-break: break-all;
      }
      .stats {
        margin-top: 0.35rem;
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .badge {
        font-size: 0.76rem;
        border-radius: 999px;
        padding: 0.2rem 0.45rem;
        background: #334155;
      }
      .copy {
        background: #0b1220;
        border: 1px solid #334155;
        color: #cbd5e1;
      }
    </style>
  </head>
  
  <body>
    <div class="card">
      <h1>Random Password Generator</h1>
      <p class="subtitle">
        Choose options, generate strong passwords, and copy instantly.
      </p>
      <div class="form">
        <div>
          <label for="length">Length</label>
          <input id="length" type="number" min="4" max="128" value="16" />
        </div>
        <div class="checkbox-grid">
          <label class="checkbox"
            ><input id="includeUppercase" type="checkbox" checked />
            <span>Uppercase</span></label
          >
          <label class="checkbox"
            ><input id="includeLowercase" type="checkbox" checked />
            <span>Lowercase</span></label
          >
          <label class="checkbox"
            ><input id="includeNumbers" type="checkbox" checked />
            <span>Numbers</span></label
          >
          <label class="checkbox"
            ><input id="includeSymbols" type="checkbox" checked />
            <span>Symbols</span></label
          >
        </div>
        <button id="generate" class="generate">Generate Password</button>
        <div class="result">
          <p id="result">Your generated password appears here.</p>
          <div class="stats">
            <span id="strength" class="badge">Strength: -</span
            ><span id="lengthInfo" class="badge">Length: 0</span>
          </div>
        </div>
        <button id="copyBtn" class="copy" style="display: none">
          Copy Password
        </button>
      </div>
    </div>
    <script>
      const resultEl = document.getElementById("result");
      const strengthEl = document.getElementById("strength");
      const lengthInfo = document.getElementById("lengthInfo");
      const copyBtn = document.getElementById("copyBtn");

      function randomChar(str) {
        return str[Math.floor(Math.random() * str.length)];
      }
      function getStrength(password) {
        let score = 0;
        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;
        const labels = [
          "Very Weak",
          "Weak",
          "Fair",
          "Good",
          "Strong",
          "Very Strong",
          "Excellent",
        ];
        const colors = [
          "#b91c1c",
          "#ef4444",
          "#f59e0b",
          "#0ea5e9",
          "#22c55e",
          "#10b981",
          "#7c3aed",
        ];
        return {
          label: labels[Math.min(score, labels.length - 1)],
          color: colors[Math.min(score, colors.length - 1)],
        };
      }

      document.getElementById("generate").addEventListener("click", () => {
        const length = Math.min(
          128,
          Math.max(4, Number(document.getElementById("length").value) || 16),
        );
        const charSets = [];
        if (document.getElementById("includeUppercase").checked)
          charSets.push("ABCDEFGHIJKLMNOPQRSTUVWXYZ");
        if (document.getElementById("includeLowercase").checked)
          charSets.push("abcdefghijklmnopqrstuvwxyz");
        if (document.getElementById("includeNumbers").checked)
          charSets.push("0123456789");
        if (document.getElementById("includeSymbols").checked)
          charSets.push("!@#$%^&*()_+~`|}{[]:;?><,./-=");
        if (!charSets.length) {
          resultEl.textContent =
            "Select at least one character type to generate.";
          resultEl.style.color = "#fecaca";
          copyBtn.style.display = "none";
          strengthEl.textContent = "Strength: -";
          lengthInfo.textContent = "Length: 0";
          return;
        }
        const allChars = charSets.join("");
        let pwd = "";
        for (let i = 0; i < length; i++) pwd += randomChar(allChars);
        resultEl.textContent = pwd;
        resultEl.style.color = "#e2e8f0";
        const strength = getStrength(pwd);
        strengthEl.textContent = `Strength: ${strength.label}`;
        strengthEl.style.background = strength.color;
        lengthInfo.textContent = `Length: ${pwd.length}`;
        copyBtn.style.display = "inline-block";
      });

      copyBtn.addEventListener("click", async () => {
        const text = resultEl.textContent;
        if (!text || text.startsWith("Select at least")) return;
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = "Copied!";
          setTimeout(() => (copyBtn.textContent = "Copy Password"), 1200);
        } catch {
          alert("Copy failed. Please copy manually.");
        }
      });
    </script>
  </body>
</html>
